name: CI/CD for File Extraction and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - uses: actions/checkout@v2

      # Step 2: Install wget and unrar for downloading and extracting
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unrar

      # Step 3: Download the .rar file
      - name: Download .rar File
        run: |
          wget -O game.rar https://paster.vip/6wW72Ubm-DaysR.ER-GameDrive.Org.rar

      # Step 4: Extract the specific file (if it exists)
      - name: Extract File
        run: |
          mkdir extracted
          unrar e game.rar "archive_root/BendGame/Content/Paks/Lang/en.pak" extracted/
        continue-on-error: true # If file does not exist, don't fail the workflow

      # Step 5: Check if the file exists, if not list contents of the archive
      - name: Check File and List Archive Contents
        run: |
          if [ -f "extracted/en.pak" ]; then
            echo "File exists, preparing for release"
          else
            echo "File not found, listing contents of the archive:"
            unrar l game.rar # List contents of the .rar archive recursively
          fi
        continue-on-error: true # If the file doesn't exist, continue with the workflow

      # Step 6: Bump version and push tag
      - name: Bump version and push tag
        id: bump
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: false

      # Step 7: Create Release (only if the file exists)
      - name: Create Release
        if: exists('extracted/en.pak') # This condition ensures release happens only if the file exists
        uses: softprops/action-gh-release@v1
        with:
          files: ./extracted/en.pak
          tag_name: ${{ steps.bump.outputs.new_tag }}
          token: ${{ secrets.GITHUB_TOKEN }}