name: CI/CD for File Extraction and Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 512
          swap-size-mb: 1024
          remove-dotnet: 'true'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unrar fuseiso

      - name: Download .rar File
        run: |
          RAR_URL="https://paster.vip/6wW72Ubm-DaysR.ER-GameDrive.Org.rar"
          echo "Downloading RAR file from $RAR_URL"
          wget --progress=bar:force:noscroll -O game.rar "$RAR_URL" 2>&1 \
            | grep --line-buffered -o '[0-9]\{1,3\}% \[[=> ]\+\]' || true

      - name: Extract ISO from RAR
        run: |
          mkdir -p rar-extracted
          unrar e game.rar "*iso" rar-extracted/

      - name: Mount ISO and Copy en.pak
        id: extract
        run: |
          mkdir -p iso-mount extracted
          ISO_PATH=$(find rar-extracted -iname "*.iso" | head -n 1)
          if [ -z "$ISO_PATH" ]; then
            echo "❌ No ISO file found."
            echo "file_exists=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "🔗 Mounting ISO: $ISO_PATH"
          fuseiso "$ISO_PATH" iso-mount

          echo "📂 Listing files inside ISO recursively:"
          find iso-mount

          echo "🔍 Searching for en.pak..."
          find iso-mount -iname "en.pak" -exec cp {} extracted/en.pak \;

          echo "🔓 Unmounting ISO..."
          fusermount -u iso-mount

          if [ -f "extracted/en.pak" ]; then
            echo "✅ en.pak extracted successfully."
            echo "file_exists=true" >> $GITHUB_OUTPUT
          else
            echo "❌ en.pak not found."
            echo "file_exists=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Create Release
        if: ${{ steps.extract.outputs.file_exists == 'true' }}
        uses: softprops/action-gh-release@v1
        with:
          files: extracted/en.pak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}