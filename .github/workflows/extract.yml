name: CI/CD for File Extraction and Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 512
          swap-size-mb: 1024
          remove-dotnet: 'true'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 unrar p7zip-full fuse

      - name: Define URL and File to Extract
        run: |
          echo "RAR_URL=https://paster.vip/6wW72Ubm-DaysR.ER-GameDrive.Org.rar" >> $GITHUB_ENV
          echo "TARGET_PATH=en.pak" >> $GITHUB_ENV

      - name: Download .rar File with Progress
        run: |
          aria2c -x 16 -s 16 --summary-interval=1 -o game.rar "$RAR_URL" 2>&1 \
          | grep --line-buffered -o '[0-9]\{1,3\}%' || true

      - name: Extract ISO from RAR
        run: |
          mkdir -p iso_extracted
          unrar e game.rar "*.iso" iso_extracted/
          ISO_FILE=$(find iso_extracted -type f -name "*.iso" | head -n 1)
          echo "ISO_PATH=$ISO_FILE" >> $GITHUB_ENV

      - name: Mount ISO and Copy en.pak
        id: extract
        run: |
          mkdir -p /tmp/iso extracted
          if [ -z "$ISO_PATH" ]; then
            echo "❌ No ISO file found."
            echo "file_exists=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "🔗 Mounting ISO: $ISO_PATH"
          sudo mount -o loop "$ISO_PATH" /tmp/iso

          echo "🔍 Searching for en.pak..."
          FOUND_FILE=$(find /tmp/iso -type f -name "$TARGET_PATH" | head -n 1 || true)
          if [[ -f "$FOUND_FILE" ]]; then
            cp "$FOUND_FILE" "extracted/en.pak"
            echo "✅ en.pak extracted successfully."
            echo "file_exists=true" >> $GITHUB_OUTPUT
          else
            echo "❌ en.pak not found."
            echo "file_exists=false" >> $GITHUB_OUTPUT
            echo "Listing all files in the mounted ISO:"
            find /tmp/iso -type f
            echo "file_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Unmount ISO
        run: |
          sudo umount /tmp/iso || true

      - name: Create Release
        if: ${{ steps.extract.outputs.file_exists == 'true' }}
        uses: softprops/action-gh-release@v1
        with:
          files: ./extracted/en.pak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
